name: CI

# Runs on every push and pull request to main/master.
# Four jobs:
#   test         — lint, type-check, unit tests (runs on every push and PR)
#   helm-lint    — validates the Helm chart (runs on every push and PR)
#   build-push   — build Docker image and push to ECR (runs only on push to main/master, after both gates pass)
#   deploy       — helm upgrade --install to EKS (runs after build-push)
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:

  # ── Job 1: Quality gates ─────────────────────────────────────────────────────
  test:
    name: Lint, type-check, test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: agent   # all commands run inside the agent/ directory

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # hatch-vcs needs full history to find git tags for versioning

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip             # caches the pip download cache between runs

      - name: Install dependencies (including dev extras)
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        # ruff check catches style issues, unused imports, undefined names, etc.
        # ruff format --check ensures code is consistently formatted
        run: |
          ruff check src/
          ruff format --check src/

      - name: Type-check with mypy
        # mypy --strict verifies type annotations are correct before any code runs.
        # ignore_missing_imports=true is set in pyproject.toml for incomplete stubs.
        run: mypy -p agent

      - name: Run unit tests with coverage
        # Only domain/ and application/ are held to the 70% threshold.
        # Infrastructure and API are tested pragmatically (see CLAUDE.md).
        run: |
          pytest tests/unit/ \
            --cov=src/agent/domain \
            --cov=src/agent/application \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v


  # ── Job 2: Helm chart lint ───────────────────────────────────────────────────
  helm-lint:
    name: Lint Helm chart
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint agent/helm/agent


  # ── Job 3: Build and push to ECR ─────────────────────────────────────────────
  build-push:
    name: Build Docker image and push to ECR
    runs-on: ubuntu-latest
    needs: [test, helm-lint]                 # only runs if both quality gates pass
    if: github.event_name == 'push'         # not on pull requests — avoid pushing unreviewed code

    permissions:
      id-token: write   # required for GitHub OIDC token (used to assume the AWS IAM role)
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        # GitHub OIDC: GitHub generates a short-lived token; AWS exchanges it for
        # temporary credentials by assuming the IAM role. No AWS keys stored in GitHub.
        # One-time setup required in AWS: create an OIDC identity provider for
        # https://token.actions.githubusercontent.com and an IAM role with ECR push permissions.
        # Store the role ARN in GitHub → Settings → Secrets → AWS_ROLE_ARN.
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          REPOSITORY: ai-agent-repository
          IMAGE_TAG: ${{ github.sha }}   # unique tag per commit — enables rollback
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG agent/
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

          # Also tag as `latest` so EKS can always pull the most recent build
          docker tag $REGISTRY/$REPOSITORY:$IMAGE_TAG $REGISTRY/$REPOSITORY:latest
          docker push $REGISTRY/$REPOSITORY:latest

          echo "Image pushed: $REGISTRY/$REPOSITORY:$IMAGE_TAG"


  # ── Job 4: Deploy to EKS ──────────────────────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-push
    if: github.event_name == 'push'

    permissions:
      id-token: write   # required for OIDC
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Update kubeconfig for EKS
        run: aws eks update-kubeconfig --name ai-agent-eks --region eu-central-1

      - name: Deploy to EKS via Helm
        # helm upgrade --install is idempotent: installs on first run, upgrades on subsequent runs.
        # --wait blocks until the Deployment rollout completes (or fails) so the job result
        # reflects whether the new pod actually started, not just whether the manifest was applied.
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          helm upgrade --install agent agent/helm/agent \
            --set image.repository=$REGISTRY/ai-agent-repository \
            --set image.tag=$IMAGE_TAG \
            --set config.opensearchEndpoint=${{ secrets.OPENSEARCH_ENDPOINT }} \
            --wait \
            --timeout 5m
