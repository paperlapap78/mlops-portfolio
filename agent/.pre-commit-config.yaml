repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml

# Ruff is the modern, insanely fast Python linter/formatter (replaces Flake8/Black/Isort)
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.4
    hooks:
    -   id: ruff
        args: [ --fix ]
    -   id: ruff-format

# Mypy - The strict static type checker
-   repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.9.0
    hooks:
    -   id: mypy
        # It relies on the pyproject.toml configuration to aggressively ban 'Any'
        additional_dependencies: [types-requests]

# Local Pytest Coverage Hook
-   repo: local
    hooks:
    -   id: pytest-coverage
        name: "Code Coverage (Pytest)"
        # Runs tests and prints coverage terminal report before allowing a commit
        entry: pytest src/ tests/ --cov=src --cov-report=term-missing
        language: system
        pass_filenames: false
        always_run: true
